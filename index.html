<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>いまぬきっ！</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="images/img_logo.png" class="header-logo" alt="いまぬきっ！">
  </header>
  <main id="feed"></main>
  <div id="age-gate" class="age-gate">
    <div class="age-gate-box">
      <p class="age-gate-label">⚠️ 年齢確認</p>
      <p class="age-gate-desc">このサイトは成人向けコンテンツを含みます。<br>あなたは18歳以上ですか？</p>
      <div class="age-gate-buttons">
        <button class="btn-yes" id="btn-yes">18歳以上・入場する</button>
        <button class="btn-no" id="btn-no">18歳未満・退場する</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
